name: Windows compatibility

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 引擎/remotion/package-lock.json
      - run: npm ci --prefix 引擎/remotion
      - run: npm run check
      - run: npm run gallery
