name: Windows native smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  transcribe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 引擎/remotion/package-lock.json
      - run: npm ci --prefix 引擎/remotion
      - run: npm run setup -- --model tiny
      - name: Transcribe an audio-bearing fixture
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP "windows-native-smoke.log"
          npm run transcribe -- --input "引擎/remotion/public/demo/livestream-audio-smoke.mp4" --name windows-native-smoke --model tiny --language en 2>&1 |
            Tee-Object -FilePath $logPath
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $detail = (Get-Content -Path $logPath -Raw).Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Host "::error title=Windows native Whisper smoke::$detail"
            exit $exitCode
          }
